<script>
        document.addEventListener('DOMContentLoaded', () => {
            const closeBtn = document.querySelector('button[aria-label="Close menu"]');
            
            // Interaction: Tap to simulate closing with scale effect
            closeBtn.addEventListener('click', () => {
                const menu = document.querySelector('.fixed');
                menu.style.transition = 'all 0.4s cubic-bezier(0.16, 1, 0.3, 1)';
                menu.style.opacity = '0';
                menu.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    // In a real app, this would hide the component or navigate back
                    alert('Menu closed. In a live environment, this would return to the previous screen.');
                    menu.style.opacity = '1';
                    menu.style.transform = 'scale(1)';
                }, 400);
            });

            // Smooth entrance for navigation links
            const navItems = document.querySelectorAll('.nav-item-enter');
            navItems.forEach((item, index) => {
                item.style.animationDelay = `${(index * 0.05) + 0.1}s`;
            });
        });
    </script>
