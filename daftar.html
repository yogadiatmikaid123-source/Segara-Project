<script>
        // Simple micro-interaction for password toggle
        const toggleBtn = document.querySelector('button span.material-symbols-outlined:contains("visibility")');
        if(toggleBtn) {
            toggleBtn.parentElement.addEventListener('click', function() {
                const input = this.previousElementSibling;
                if (input.type === 'password') {
                    input.type = 'text';
                    this.querySelector('span').textContent = 'visibility_off';
                } else {
                    input.type = 'password';
                    this.querySelector('span').textContent = 'visibility';
                }
            });
        }

        // Custom "contains" selector logic for the script above
        document.querySelectorAll('button .material-symbols-outlined').forEach(icon => {
            if (icon.textContent === 'visibility') {
                icon.parentElement.addEventListener('click', function() {
                    const input = this.previousElementSibling;
                    if (input.type === 'password') {
                        input.type = 'text';
                        icon.textContent = 'visibility_off';
                    } else {
                        input.type = 'password';
                        icon.textContent = 'visibility';
                    }
                });
            }
        });
    </script>
